<script data-purpose="terminal-simulation">
    // Simple script to simulate the ingestion process visual
    const terminal = document.getElementById('terminal-content');
    const logs = [
      { text: 'Initialising secure connection...', delay: 500 },
      { text: 'Cloning repository from remote...', delay: 1500 },
      { text: 'Reading manifest files...', delay: 2200 },
      { text: 'AST Parsing: 142 source files detected...', delay: 3000 },
      { text: 'Generating high-dimensional embeddings (Sentence-BERT)...', delay: 4500 },
      { text: 'Saving vector records to ChromaDB...', delay: 6000 },
      { text: 'Process complete. Repository indexed.', delay: 7500, status: 'SUCCESS' }
    ];

    function addLogLine(text, status = '') {
      const div = document.createElement('div');
      div.className = 'flex space-x-3 opacity-0 translate-y-2 transition-all duration-500';
      
      const symbol = document.createElement('span');
      symbol.className = 'text-brand shrink-0';
      symbol.innerText = '[$]';
      
      const content = document.createElement('span');
      content.className = status === 'SUCCESS' ? 'text-green-500 font-bold' : 'text-gray-300';
      content.innerText = text;

      div.appendChild(symbol);
      div.appendChild(content);
      terminal.appendChild(div);

      // Trigger animation
      setTimeout(() => {
        div.classList.remove('opacity-0', 'translate-y-2');
        terminal.scrollTop = terminal.scrollHeight;
      }, 50);
    }

    // Auto-run simulation for demonstration purposes after 1 second
    window.addEventListener('load', () => {
      setTimeout(() => {
        terminal.innerHTML = ''; // Clear waiting message
        logs.forEach(log => {
          setTimeout(() => {
            addLogLine(log.text, log.status);
          }, log.delay);
        });
      }, 1000);
    });
  </script>
