<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a73d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b38a23;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Subtle outer boundary -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#d4a73d" stroke-width="1.5" stroke-opacity="0.6" />
  
  <!-- Outer scope ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#grad)" stroke-width="6" stroke-dasharray="18 10" filter="url(#glow)"/>
  
  <!-- Inner AI Core -->
  <circle cx="50" cy="50" r="15" fill="url(#grad)" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="6" fill="#121212" />
  
  <!-- Crosshairs -->
  <path d="M50 4 L50 22 M50 96 L50 78 M4 50 L22 50 M96 50 L78 50" stroke="url(#grad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
</svg>